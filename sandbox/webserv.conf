server {
    listen 127.0.0.1:8080;
    server_name 127.0.0.1:8080 localhost:8080;
    error_page 403 /home/aelsayed/webserv/sandbox/errors/403.html;
    error_page 404 /home/aelsayed/webserv/sandbox/errors/404.html;
    error_page 500 /home/aelsayed/webserv/sandbox/errors/500.html;
    client_max_body_size 10k;
    root /home/aelsayed/webserv/sandbox;
    location / {
        return 301 /desc;
        autoindex on;
        allow_methods GET;
    }
    location /desc {
        root /home/aelsayed/webserv/sandbox/desc;
        index index.html; 
        allow_methods GET;
    }
    location /login {
        root /home/aelsayed/webserv/sandbox/login;
        index index.html; 
        allow_methods GET;
    }
    location /tests {
        root /home/aelsayed/webserv/sandbox/tests;
        index index.html;
        allow_methods GET;
    }
    location /uploads {
        root /home/aelsayed/webserv/sandbox/uploads;
        upload_enable on;
        autoindex on;
        allow_methods POST PUT GET DELETE;
    }
    location /cgi-bin {
        root /home/aelsayed/webserv/sandbox/cgi-bin;
        cgi .py /opt/pyenv/shims/python3;
        cgi .js /usr/bin/node;
        cgi .sh /usr/bin/bash;
        allow_methods GET;
    }
}
